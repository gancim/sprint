services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sprint
      POSTGRES_PASSWORD: sprint
      POSTGRES_DB: sprint
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprint -d sprint"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://sprint:sprint@db:5432/sprint
      PORT: "3100"
      SERVE_UI: "true"
      SPRINT_DEPLOYMENT_MODE: "authenticated"
      SPRINT_DEPLOYMENT_EXPOSURE: "private"
      SPRINT_PUBLIC_URL: "${SPRINT_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - sprint-data:/sprint
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  sprint-data:
